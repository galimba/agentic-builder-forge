version: 2
updates:
  # Keep the pinned GitHub Actions SHAs fresh (CI pins every action by commit SHA).
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'

  # Keep the dev toolchain (eslint / prettier / typescript / vitest) up to date.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
    labels:
      - 'dependencies'
