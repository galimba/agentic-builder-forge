name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: Canonical Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the canonical gate
        # Default (tolerant) mode: suites whose runtime is absent on the runner
        # (bd, devcontainer CLI) SKIP honestly (rc 75) and are reported distinctly —
        # never folded into PASS. Set FORGE_GATE_STRICT=1 on a fully-provisioned
        # runner to make any SKIP fail the gate.
        run: bash tests/run-all.sh

  doctor:
    name: Template Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run doctor (at-rest mode)
        run: bash .forge/scripts/doctor.sh

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: ShellCheck (error severity, whole tree)
        run: |
          find harness .claude/hooks .forge/scripts tests -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=error
      - name: ShellCheck (default severity, init layer)
        run: shellcheck .forge/scripts/*.sh

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            **/*.md
            !node_modules
          config: '.markdownlint.yaml'

  check-typos:
    name: Check Typos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1
        with:
          config: '_typos.toml'
