name: Feature Request
description: Propose an improvement to the harness template
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is harder than it should be?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the mechanism change? Which config seam or component does it touch?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: floor
    attributes:
      label: Enforcement impact
      options:
        - label: This proposal touches the enforcement floor (.claude/hooks/, settings.json) or the gate
