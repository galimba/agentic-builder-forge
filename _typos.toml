# Typos configuration
# See: https://github.com/crate-ci/typos

[default.extend-words]
# Domain-specific terms that are NOT typos
agentic = "agentic"
ratify = "ratify"
worktree = "worktree"
worktrees = "worktrees"
devcontainer = "devcontainer"
beads = "beads"
bd = "bd"
# Legitimate words + terse code abbreviations used in comments/fixtures (case-insensitive)
unparseable = "unparseable"
driveable = "driveable"
allo = "allo"
anc = "anc"
agre = "agre"
legac = "legac"
aspec = "aspec"
mis = "mis"
fpr = "fpr"
nd = "nd"
categor = "categor"

[files]
# Fixtures and generated files carry deliberate short tokens; lockfiles are generated
extend-exclude = [
    ".git/",
    "node_modules/",
    "pnpm-lock.yaml",
    "tests/*/fixtures/",
    "*.json",
]
