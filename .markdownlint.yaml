# Markdownlint configuration for agentic-builder-forge
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Line length: off — the README and harness docs intentionally carry long single-line
# prose paragraphs and long inline rationale that are not meant to be hard-wrapped.
MD013: false

# Emphasis-as-heading: off — some docs/skills use bold labels (e.g. "**1. Frontend rendering**")
# as inline emphasis within lists/examples, not as section headings.
MD036: false

# Table column style: off — a stylistic pipe-spacing/alignment rule (added in markdownlint v0.40.0);
# the repo's tables are valid, just not in the "aligned"/"compact" style this rule prefers.
MD060: false

# Allow inline HTML (structured marker blocks like <!-- forge:tasks:begin v1 --> are load-bearing)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Don't require first line to be a heading
MD041: false

# Allow multiple H1 headings
MD025: false

# Allow trailing punctuation in headings
MD026:
  punctuation: ".,;:!"

# Allow multiple blank lines
MD012:
  maximum: 2

# Allow bare URLs
MD034: false

# Don't require language on fenced code blocks
MD040: false

# Allow any ordered list prefix style
MD029: false
